<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a1430"/>
      <stop offset="60%" stop-color="#02030a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66f7ff"/>
      <stop offset="60%" stop-color="#00eaff"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="100%" stop-color="#ff3366"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- starfield specks -->
  <g fill="#fff" opacity="0.65">
    <circle cx="60"  cy="80"  r="2"/>
    <circle cx="430" cy="120" r="2.5"/>
    <circle cx="120" cy="380" r="1.5"/>
    <circle cx="380" cy="420" r="2"/>
    <circle cx="250" cy="60"  r="1"/>
    <circle cx="80"  cy="280" r="1.5"/>
    <circle cx="450" cy="320" r="1.5"/>
  </g>
  <!-- exhaust flame -->
  <path d="M256 380 L226 460 L256 440 L286 460 Z" fill="url(#flame)" opacity="0.9"/>
  <!-- ship hull -->
  <path d="M256 110 L320 280 L300 320 L256 290 L212 320 L192 280 Z" fill="url(#ship)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  <!-- canopy -->
  <ellipse cx="256" cy="200" rx="22" ry="32" fill="#ffea00" stroke="#050a18" stroke-width="4"/>
  <!-- wing accents -->
  <path d="M212 300 L172 320 L196 250 Z" fill="#ff66cc" opacity="0.85"/>
  <path d="M300 300 L340 320 L316 250 Z" fill="#ff66cc" opacity="0.85"/>
</svg>
